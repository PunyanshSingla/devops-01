name: First time making ci cd pipeline

on: 
  push:
    branches:
      - main

jobs: 
  deploy:  
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Excloud Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.213
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/devops-01
            npm install
            pm2 restart 0 
